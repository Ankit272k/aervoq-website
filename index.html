<!DOCTYPE html>
<html>
<head>
  <title>AERVOQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #111;
      color: #fff;
    }

    /* HERO SECTION */
    .hero {
      height: 90vh;
      background: linear-gradient(to bottom, #000 60%, #111);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 12vw;
      letter-spacing: 4px;
      margin: 0;
    }

    .hero p {
      margin-top: 15px;
      opacity: 0.7;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* SECTION */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    h2 {
      font-weight: 500;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .grid img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      padding: 30px;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
      border-top: 1px solid #222;
    }

    @media(min-width:768px){
      .hero h1{
        font-size: 90px;
      }
      .grid{
        grid-template-columns: repeat(3,1fr);
      }
    }

  </style>
</head>

<body>

<div class="hero">
  <h1>AERVOQ</h1>
  <p>ELEVATING EVERYDAY ESSENTIALS</p>
</div>

<section>
  <h2>Drop 01 — Oversized Collection</h2>
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1520975922203-b6d5e0c8d6b0">
    <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
    <img src="https://images.unsplash.com/photo-1593032465171-8e3d16d1b6e7">
  </div>
</section>

<section>
  <h2>Minimal. Bold. Timeless.</h2>
  <p style="opacity:0.7; max-width:600px; margin:auto;">
    Designed for those who don’t follow trends — they define them.
  </p>
</section>

<footer>
  © 2026 AERVOQ — All Rights Reserved.
</footer>

</body>
</html>
