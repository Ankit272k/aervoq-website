<!DOCTYPE html>
<html>
<head>
  <title>AERVOQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    header h1 {
      font-size: 72px;
      letter-spacing: 10px;
      margin: 0;
    }

    header p {
      opacity: 0.7;
      margin-top: 20px;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .grid img {
      width: 100%;
      border-radius: 6px;
    }

    footer {
      padding: 40px;
      text-align: center;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>AERVOQ</h1>
  <p>Elevating Everyday Essentials</p>
</header>

<section>
  <h2>Drop 01 — Oversized Collection</h2>
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1520975922203-b6d5e0c8d6b0">
    <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
    <img src="https://images.unsplash.com/photo-1593032465171-8e3d16d1b6e7">
  </div>
</section>

<section>
  <h2>Minimal. Bold. Timeless.</h2>
  <p>Designed for those who don’t follow trends — they define them.</p>
</section>

<footer>
  © 2026 AERVOQ. All Rights Reserved.
</footer>

</body>
</html>
